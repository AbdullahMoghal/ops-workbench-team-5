# =============================================================================
# DEV / DEMO profile — uses H2 in-memory database, no Supabase required
# Run with: mvn spring-boot:run -Dspring-boot.run.profiles=dev
# =============================================================================

# H2 in-memory datasource
spring.datasource.url=jdbc:h2:mem:warehouseops;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Let Hibernate create the schema from entities
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# H2 console (available at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Disable JWT auth in dev — all /api/** endpoints are open
warehouse.dev.auth-disabled=true

# Dummy JWT secret (not used in dev)
supabase.jwt.secret=dev-secret-not-used
