# =============================================================================
# Warehouse Ops Application Configuration
# =============================================================================

spring.application.name=warehouse-ops

# --- Database (Supabase Postgres via Railway env vars) ---
spring.datasource.url=${SUPABASE_DB_URL:jdbc:postgresql://localhost:5432/warehouse_ops}
spring.datasource.username=${SUPABASE_DB_USER:postgres}
spring.datasource.password=${SUPABASE_DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP — increase timeouts for Supabase pooler
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=60000
spring.datasource.hikari.maximum-pool-size=5

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# --- Supabase JWT ---
supabase.jwt.secret=${SUPABASE_JWT_SECRET:your-supabase-jwt-secret-here}

# --- Server ---
server.port=${PORT:8080}
server.error.include-message=always
server.error.include-binding-errors=always

# --- CORS origins ---
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000,https://ops-workbench-team-5.vercel.app}

# --- Logging ---
logging.level.com.warehouse.ops=INFO
logging.level.org.springframework.security=WARN
