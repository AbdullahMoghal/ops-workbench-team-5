# =============================================================================
# Warehouse Ops Application Configuration
# Copy this file and override values via environment variables or .env
# =============================================================================

spring.application.name=warehouse-ops

# --- Database (Supabase Postgres) ---
spring.datasource.url=${SUPABASE_DB_URL:jdbc:postgresql://localhost:5432/warehouse_ops}
spring.datasource.username=${SUPABASE_DB_USER:postgres}
spring.datasource.password=${SUPABASE_DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- Supabase JWT ---
# The JWT secret from Supabase project settings > API > JWT Secret
supabase.jwt.secret=${SUPABASE_JWT_SECRET:your-supabase-jwt-secret-here}

# --- Server ---
server.port=${PORT:8080}
server.error.include-message=always
server.error.include-binding-errors=always

# --- CORS origins (comma-separated) ---
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# --- Logging ---
logging.level.com.warehouse.ops=DEBUG
logging.level.org.springframework.security=WARN
